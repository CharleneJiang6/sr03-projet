<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer utilisateur - SR03</title>

    <style>
        body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #fff7fb; color: #2b2b2b; }
        .admin-navbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; background: #fff; box-shadow: 0 4px 20px rgba(214,51,132,0.10); }
        .admin-logo { font-size: 22px; font-weight: 700; color: #d63384; }
        .admin-links a { margin-left: 22px; text-decoration: none; color: #444; font-weight: 500; }
        .admin-links a:hover, .admin-links .logout { color: #d63384; }
        .container { max-width: 720px; margin: 0 auto; padding: 50px 30px; }
        .card { background: white; border-radius: 22px; padding: 38px; box-shadow: 0 8px 30px rgba(214,51,132,0.10); border: 1px solid #f7d8e8; }
        h1 { margin-top: 0; font-size: 34px; }
        label { font-weight: 600; }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%; padding: 13px; margin: 8px 0 20px; border: 1px solid #efd5e2; border-radius: 12px;
        }
        .error { color: #dc3545; font-weight: 600; }
        .btn { width: 100%; border: none; background: #d63384; color: white; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .checkbox-line { margin: 12px 0; }
    </style>
</head>
<body>

<div th:replace="admin/fragments/navbar :: navbar"></div>

<div class="container">
    <div class="card">
        <h1>Créer un utilisateur</h1>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/admin/users/create}" th:object="${user}" method="post">
            <label>Prénom</label>
            <input type="text" th:field="*{firstname}" required minlength="2">

            <label>Nom</label>
            <input type="text" th:field="*{lastname}" required minlength="2">

            <label>Email</label>
            <input type="email" th:field="*{mail}" required>

            <label>Mot de passe</label>
            <input type="password" th:field="*{password}" required minlength="8">

            <div class="checkbox-line">
                <input type="checkbox" th:field="*{admin}">
                <label>Administrateur</label>
            </div>

            <button class="btn" type="submit">Créer le compte</button>
        </form>
    </div>
</div>

</body>
</html>
