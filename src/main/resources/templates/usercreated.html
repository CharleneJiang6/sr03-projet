<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Utilisateur créé - SR03</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #fff7fb;
            color: #2b2b2b;
        }

        .admin-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 40px;
            background: #ffffff;
            box-shadow: 0 4px 20px rgba(214, 51, 132, 0.10);
        }

        .admin-logo {
            font-size: 22px;
            font-weight: 700;
            color: #d63384;
        }

        .admin-links a {
            margin-left: 22px;
            text-decoration: none;
            color: #444;
            font-weight: 500;
        }

        .admin-links a:hover,
        .admin-links .logout {
            color: #d63384;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 30px;
        }

        .card {
            background: white;
            border-radius: 22px;
            padding: 38px;
            box-shadow: 0 8px 30px rgba(214, 51, 132, 0.10);
            border: 1px solid #f7d8e8;
        }

        .success-icon {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: #fce7f3;
            color: #d63384;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 34px;
            color: #2b2b2b;
        }

        .subtitle {
            margin: 0 0 30px;
            color: #777;
            font-size: 17px;
        }

        .user-summary {
            background: #fff7fb;
            border: 1px solid #f7d8e8;
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .info-item {
            background: #ffffff;
            border: 1px solid #f2d4e3;
            border-radius: 15px;
            padding: 18px;
        }

        .label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #d63384;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        .value {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            word-break: break-word;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-primary {
            background: #d63384;
            color: white;
        }

        .btn-primary:hover {
            background: #b72a6f;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5c636a;
        }

        @media (max-width: 750px) {
            .admin-navbar {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .admin-links a {
                margin-left: 0;
                margin-right: 14px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 35px 20px;
            }
        }
    </style>
</head>

<body>

<div th:replace="admin/fragments/navbar :: navbar"></div>

<div class="container">
    <div class="card">
        <div class="success-icon">✓</div>

        <h1>Utilisateur créé avec succès</h1>
        <p class="subtitle">
            Le compte utilisateur a bien été ajouté à l’application SR03.
        </p>

        <div class="user-summary" th:object="${user}">
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">Prénom</span>
                    <span class="value" th:text="*{firstname}">Prénom</span>
                </div>

                <div class="info-item">
                    <span class="label">Nom</span>
                    <span class="value" th:text="*{lastname}">Nom</span>
                </div>

                <div class="info-item">
                    <span class="label">Email</span>
                    <span class="value" th:text="*{mail}">email@example.com</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <a class="btn btn-primary" th:href="@{/admin/users}">
                Voir la liste des utilisateurs
            </a>

            <a class="btn btn-secondary" th:href="@{/admin/users/create}">
                Créer un autre utilisateur
            </a>

            <a class="btn btn-secondary" th:href="@{/admin}">
                Retour à l’accueil
            </a>
        </div>
    </div>
</div>

</body>
</html>
