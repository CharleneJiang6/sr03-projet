<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TD2 - SR03</title>
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">

</head>
<body>

<header>
    <h1> Ajouter un utilisateur </h1>
</header>

<main>
    <form th:action="@{/create-user}" th:object="${user}" method="post">
        <p>Nom : <input type="text" th:field="*{firstname}"/></p>
        <p>Prénom : <input type="text" th:field="*{lastname}"/></p>
        <p>Mail : <input type="text" th:field="*{mail}"/></p>
        <p>Mot de passe : <input type="text" th:field="*{password}"/></p>
        <p><input type="submit" value="Valider"/> <input type="reset" value="Annuler"/></p>
    </form>


</main>

<footer>

</footer>

</body>
<script src="https://cdn.metroui.org.ua/current/metro.js"></script>
</html>
